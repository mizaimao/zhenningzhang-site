project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"

website:
  title: "Zhenning Zhang"
  description: "Machine Learning Engineer — drug discovery and medical imaging."
  site-url: "https://zhenningzhang.net"
  open-graph: true
  twitter-card: false
  page-navigation: false
  back-to-top-navigation: false

  navbar:
    pinned: true
    logo: false
    title: "Zhenning Zhang"
    left:
      - href: index.qmd
        text: Home
      - href: projects.qmd
        text: Work
      - href: publications.qmd
        text: Publications
      - href: experiments.qmd
        text: Tinkering
      - href: about.qmd
        text: About
    right:
      - text: "CV"
        href: "assets/zhenning_zhang_resume.pdf"
      - icon: github
        href: "https://github.com/mizaimao"
        aria-label: GitHub
      - icon: linkedin
        href: "https://www.linkedin.com/in/zhenning-zhang"
        aria-label: LinkedIn

  page-footer:
    left: |
      © 2026 Zhenning Zhang
    right: |
      Built with [Quarto](https://quarto.org). Source on [GitHub](https://github.com/mizaimao).

format:
  html:
    theme:
      dark:
        - darkly
        - theme.scss
      light:
        - cosmo
        - theme-light.scss
    toc: false
    grid:
      body-width: 800px
      sidebar-width: 220px
      margin-width: 220px
    link-external-newwindow: true
    link-external-icon: false
    code-copy: true
    smooth-scroll: true
    anchor-sections: false
    fontsize: "1.0625rem"
    mainfont: "Helvetica Neue, Helvetica, Arial, sans-serif"
    monofont: "JetBrains Mono, ui-monospace, SF Mono, Menlo, monospace"
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    include-after-body: assets/appearance.html

execute:
  freeze: auto
