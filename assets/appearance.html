<div class="appearance-picker" data-no-print>
  <button
    class="appearance-picker__trigger"
    id="accent-trigger"
    type="button"
    aria-label="Change accent color"
    aria-haspopup="true"
    aria-expanded="false"
  ></button>
  <div
    class="appearance-picker__menu"
    id="accent-menu"
    hidden
    role="dialog"
    aria-label="Accent colors"
  >
    <p class="appearance-picker__label">Accent</p>
    <div class="appearance-picker__swatches" id="accent-swatches"></div>
  </div>
</div>

<script>
(function () {
  const ACCENTS = [
    { name: 'Green',   dark: ['#7ee787', '#56d364'], light: ['#2da44e', '#1a7f37'] },
    { name: 'Blue',    dark: ['#58a6ff', '#388bfd'], light: ['#0969da', '#0550ae'] },
    { name: 'Crimson', dark: ['#f85149', '#da3633'], light: ['#cf222e', '#a40e26'] },
    { name: 'Amber',   dark: ['#e3b341', '#d29922'], light: ['#9a6700', '#633c01'] },
    { name: 'Purple',  dark: ['#a371f7', '#8957e5'], light: ['#8250df', '#6639ba'] },
    { name: 'Teal',    dark: ['#39d0d8', '#22a6ad'], light: ['#117177', '#055b5e'] }
  ];
  const STORAGE_KEY = 'appearance.accent';
  const root = document.documentElement;

  function isDark() {
    // Quarto sets data-bs-theme on <html>; default to dark if absent
    return (root.getAttribute('data-bs-theme') || 'dark') === 'dark';
  }

  function applyAccentByName(name) {
    const preset = ACCENTS.find(a => a.name === name);
    if (!preset) {
      // Unknown — clear overrides so SCSS defaults take effect
      root.style.removeProperty('--accent');
      root.style.removeProperty('--accent-deep');
      return;
    }
    const [accent, deep] = isDark() ? preset.dark : preset.light;
    root.style.setProperty('--accent', accent);
    root.style.setProperty('--accent-deep', deep);
  }

  function currentAccentName() {
    return localStorage.getItem(STORAGE_KEY); // null if unset
  }

  // Restore on load
  const saved = currentAccentName();
  if (saved) applyAccentByName(saved);

  // Re-apply when Quarto toggles the theme (so picked accent uses the
  // theme-appropriate variant)
  new MutationObserver(() => {
    const name = currentAccentName();
    if (name) applyAccentByName(name);
  }).observe(root, { attributes: true, attributeFilter: ['data-bs-theme'] });

  // Build the swatch UI on DOM ready
  function ready(fn) {
    if (document.readyState !== 'loading') fn();
    else document.addEventListener('DOMContentLoaded', fn);
  }

  ready(function () {
    const trigger = document.getElementById('accent-trigger');
    const menu = document.getElementById('accent-menu');
    const swatches = document.getElementById('accent-swatches');
    if (!trigger || !menu || !swatches) return;

    // Render swatches (using dark-variant hex for the swatch fill — they
    // visually represent the *family*, not the exact rendered shade)
    ACCENTS.forEach(a => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'appearance-picker__swatch';
      btn.style.background = a.dark[0];
      btn.setAttribute('aria-label', a.name);
      btn.setAttribute('data-accent-name', a.name);
      btn.setAttribute('aria-pressed', String(currentAccentName() === a.name));
      btn.addEventListener('click', () => {
        localStorage.setItem(STORAGE_KEY, a.name);
        applyAccentByName(a.name);
        // Update aria-pressed state across all swatches
        swatches.querySelectorAll('button').forEach(b => {
          b.setAttribute('aria-pressed', String(b.getAttribute('data-accent-name') === a.name));
        });
        closeMenu();
      });
      swatches.appendChild(btn);
    });

    function openMenu() {
      menu.hidden = false;
      trigger.setAttribute('aria-expanded', 'true');
    }
    function closeMenu() {
      menu.hidden = true;
      trigger.setAttribute('aria-expanded', 'false');
    }

    trigger.addEventListener('click', e => {
      e.stopPropagation();
      menu.hidden ? openMenu() : closeMenu();
    });

    // Close on outside click
    document.addEventListener('click', e => {
      if (!menu.hidden && !menu.contains(e.target) && e.target !== trigger) {
        closeMenu();
      }
    });

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !menu.hidden) {
        closeMenu();
        trigger.focus();
      }
    });
  });
})();
</script>
